services:
  any-to-any:
    build: .
    stdin_open: true
    tty: true
    env_file:
      - .env
    command: python any_to_any_network.py

  supervisor:
    build: .
    stdin_open: true
    tty: true
    env_file:
      - .env
    command: python supervisor_network.py

  notebook:
    build: .
    ports:
      - "8888:8888"
    env_file:
      - .env
    volumes:
      - .:/app
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --allow-root
      --no-browser
      --ServerApp.token=''
      --ServerApp.password=''